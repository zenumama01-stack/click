name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install tool dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool m4 pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Upgrade build tools
      run: |
        pip install --upgrade buildozer cython python-for-android

    - name: Install requirements
      run: |
        pip install -r requirements.txt

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_ORG_TEST_DOMAIN: 1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zenumama-click-apk
        path: bin/*.apk
